<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Playfair Display', serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#ff8fab,#ff4d88,#c9184a);
    color:white;
}

/* ================= INTRO ================= */

.intro{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#ffb3d9,#ff4d88);
    overflow:hidden;
    z-index:10;
    transition:1.2s ease;
}

.aura{
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
    animation:pulseAura 3s infinite ease-in-out;
}

@keyframes pulseAura{
    0%{transform:scale(0.8);opacity:0.6}
    50%{transform:scale(1.2);opacity:1}
    100%{transform:scale(0.8);opacity:0.6}
}

.ring{
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.4);
    animation:rotateRing 12s linear infinite;
}

@keyframes rotateRing{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

.heart-svg{
    width:200px;
    cursor:pointer;
    animation:beat 1.2s infinite;
    filter:drop-shadow(0 0 30px rgba(255,255,255,0.8))
           drop-shadow(0 0 60px rgba(255,20,147,0.9));
}

@keyframes beat{
    0%{transform:scale(1)}
    25%{transform:scale(1.15)}
    40%{transform:scale(1)}
    60%{transform:scale(1.1)}
    100%{transform:scale(1)}
}

/* Flying hearts */
.flying-heart{
    position:absolute;
    font-size:18px;
    pointer-events:none;
    animation:fly 1.6s ease-out forwards;
}

@keyframes fly{
    to{
        transform:translate(var(--x), var(--y)) scale(0.4);
        opacity:0;
    }
}

/* Sparkle */
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px white,0 0 20px pink;
    animation:sparkleMove 2s linear forwards;
}

@keyframes sparkleMove{
    to{
        transform:translate(var(--x), var(--y)) scale(0.3);
        opacity:0;
    }
}

/* Petal */
.petal{
    position:absolute;
    font-size:20px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    0%{transform:translateY(-50px) rotate(0deg); opacity:1}
    100%{transform:translateY(600px) rotate(360deg); opacity:0}
}

.intro.hide{
    opacity:0;
    visibility:hidden;
}

/* ================= MAIN ================= */

.container{
    opacity:0;
    transition:1.5s ease;
    text-align:center;
    width:90%;
    max-width:900px;
    padding:50px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border-radius:30px;
    box-shadow:0 0 80px rgba(255,20,147,0.7);
}

.container.show{opacity:1}

h1{font-size:40px;margin-bottom:25px}

.text{
    font-size:22px;
    line-height:1.9;
    min-height:220px;
}

.cursor{animation:blink 1s infinite}
@keyframes blink{0%,50%,100%{opacity:1}25%,75%{opacity:0}}

.images{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:60px;
}

.images img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:25px;
    transition:0.6s;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.images img:hover{transform:scale(1.08)}

button{
    margin-top:40px;
    padding:15px 45px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff4d88,#ff99ac);
    color:white;
    cursor:pointer;
    transition:0.4s;
}

button:hover{transform:scale(1.1)}

/* ================= FINAL ================= */

.final-screen{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#ff4d88,#c9184a);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    visibility:hidden;
    transition:1s ease;
    z-index:20;
}

.final-screen.show{
    opacity:1;
    visibility:visible;
}

.final-screen h1{
    font-size:42px;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="intro" id="intro">
    <div class="aura"></div>
    <div class="ring"></div>

    <svg class="heart-svg" onclick="openLove()" viewBox="0 0 32 29.6">
        <path fill="#ff1e56" d="M23.6,0c-3.4,0-6.4,2-7.6,5C14.8,2,11.8,0,8.4,0
        C3.8,0,0,3.8,0,8.4c0,9.5,16,21.2,16,21.2s16-11.7,16-21.2
        C32,3.8,28.2,0,23.6,0z"/>
    </svg>
</div>

<div class="container" id="main">
    <h1>Gửi Em 💖</h1>
    <div class="text">
        <span id="typing"></span><span class="cursor">|</span>
    </div>

    <div class="images">
        <img src="anh.jpg">
        <img src="em.jpg">
    </div>

    <button onclick="acceptedLove()">Đồng ý 💕</button>
</div>

<div class="final-screen" id="finalScreen">
    <h1>Chính thức thuộc về nhau rồi 💍</h1>
    <p>Từ hôm nay, anh có danh phận nhé 😌💗</p>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* Tim + sparkle */
setInterval(()=>{
    shootHearts();
    shootSparkles();
},1200);

function shootHearts(){
    const intro=document.getElementById("intro");
    for(let i=0;i<12;i++){
        let h=document.createElement("div");
        h.className="flying-heart";
        h.innerHTML="💗";
        h.style.left="50%";
        h.style.top="50%";

        let angle=Math.random()*2*Math.PI;
        let distance=150+Math.random()*200;
        let x=Math.cos(angle)*distance+"px";
        let y=Math.sin(angle)*distance+"px";

        h.style.setProperty("--x",x);
        h.style.setProperty("--y",y);

        intro.appendChild(h);
        setTimeout(()=>h.remove(),1600);
    }
}

function shootSparkles(){
    const intro=document.getElementById("intro");
    for(let i=0;i<15;i++){
        let s=document.createElement("div");
        s.className="sparkle";
        s.style.left="50%";
        s.style.top="50%";

        let angle=Math.random()*2*Math.PI;
        let distance=200+Math.random()*200;
        let x=Math.cos(angle)*distance+"px";
        let y=Math.sin(angle)*distance+"px";

        s.style.setProperty("--x",x);
        s.style.setProperty("--y",y);

        intro.appendChild(s);
        setTimeout(()=>s.remove(),2000);
    }
}

setInterval(()=>{
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),4000);
},800);

function openLove(){
    document.getElementById("intro").classList.add("hide");
    document.getElementById("main").classList.add("show");

    const music=document.getElementById("bgMusic");
    music.volume=0.5;
    music.play();

    typeEffect();
}

const message=[
"Anh không biết mình có phải là người thú vị nhất,",
"nhưng từ khi quen em, anh luôn thấy mỗi ngày trôi qua dễ chịu hơn một chút.",
"",
"Anh thích cách em nói chuyện, cách em cười,",
"và cả cách em xuất hiện rất tự nhiên trong suy nghĩ của anh.",
"",
"Nếu em cũng cảm nhận được điều gì đó giống anh…",
"",
"Làm người yêu anh nhé? 💗"
];

let line=0,char=0;
function typeEffect(){
    const t=document.getElementById("typing");
    if(line<message.length){
        if(char<message[line].length){
            t.innerHTML+=message[line].charAt(char);
            char++;
            setTimeout(typeEffect,40);
        }else{
            t.innerHTML+="<br>";
            line++;char=0;
            setTimeout(typeEffect,600);
        }
    }
}

function acceptedLove(){
    for(let i=0;i<60;i++){
        let h=document.createElement("div");
        h.className="flying-heart";
        h.innerHTML="💖";
        h.style.left=Math.random()*100+"vw";
        h.style.top=Math.random()*100+"vh";

        let x=(Math.random()-0.5)*600+"px";
        let y=(Math.random()-0.5)*600+"px";

        h.style.setProperty("--x",x);
        h.style.setProperty("--y",y);

        document.body.appendChild(h);
        setTimeout(()=>h.remove(),2000);
    }

    setTimeout(()=>{
        document.getElementById("finalScreen").classList.add("show");
    },800);
}

</script>

</body>
</html>
